<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Чемпіонат Пива</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="wrapper">

<header class="hero">

<button id="addBtn" class="addButton">
👤 ДОДАТИ УЧАСНИКА
</button>

<div class="leftDecoration">

🌾

</div>

<div class="title">

<div class="topBeer">

🍺

</div>

<h1>

ЧЕМПІОНАТ
<span>ПИВА</span>

</h1>

<div class="subtitle">

СПРОБУЙ • ОЦІНИ • СТАНЬ ЧЕМПІОНОМ

</div>

</div>

<div class="rightDecoration">

🌿

</div>

</header>



<div class="tableContainer">

<table>

<thead>

<tr>

<th style="width:70px">№</th>

<th>ІМ'Я</th>

<th>НА КОГО ПОСТАВИВ</th>

<th>НА ЯКЕ ПИВО</th>

<th>НА ЯКУ ПОДІЮ</th>

<th style="width:60px"></th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>



<div class="modal" id="modal">

<div class="modalContent">

<h2>

Новий учасник

</h2>

<input
type="text"
id="name"
placeholder="Ім'я">

<input
type="text"
id="team"
placeholder="На кого поставив">

<input
type="text"
id="beer"
placeholder="Яке пиво">

<input
type="text"
id="event"
placeholder="Назва події">

<div class="modalButtons">

<button id="cancelBtn">

Скасувати

</button>

<button id="saveBtn">

Зберегти

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
