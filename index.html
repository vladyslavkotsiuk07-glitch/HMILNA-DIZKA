<!DOCTYPE html>
<html lang="uk">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Чемпіонат • Хмільна Діжка</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

    <div class="top-bar">

        <div class="logo">

            <h1>🍺 Чемпіонат «Хмільна Діжка»</h1>

            <p>Облік ставок покупців</p>

        </div>

        <button id="addBtn">
            + Додати учасника
        </button>

    </div>



    <div class="stats">

        <div class="stat-card">
            <span class="icon">👥</span>
            <div>
                <h3 id="participantsCount">0</h3>
                <p>Учасників</p>
            </div>
        </div>

        <div class="stat-card">
            <span class="icon">🏆</span>
            <div>
                <h3 id="eventsCount">0</h3>
                <p>Подій</p>
            </div>
        </div>

        <div class="stat-card">
            <span class="icon">🍺</span>
            <div>
                <h3 id="beerCount">0</h3>
                <p>Видів пива</p>
            </div>
        </div>

    </div>



    <div class="table-card">

        <div class="table-title">

            <div>
                🌾 Список учасників
            </div>

        </div>

        <table>

            <thead>

            <tr>

                <th>№</th>

                <th>Учасник</th>

                <th>Подія</th>

                <th>На кого поставив</th>

                <th>Яке пиво купив</th>

                <th></th>

            </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

</div>





<div class="modal" id="modal">

    <div class="modal-content">

        <h2>🍺 Новий учасник</h2>

        <p class="subtitle">
            Заповніть інформацію про ставку
        </p>


        <div class="form-group">

            <label>Ім'я</label>

            <input
            id="name"
            type="text"
            placeholder="Введіть ім'я">

        </div>


        <div class="form-group">

            <label>Подія</label>

            <input
            id="event"
            type="text"
            placeholder="Наприклад: Ліга Чемпіонів">

        </div>



        <div class="form-group">

            <label>На кого поставив</label>

            <input
            id="team"
            type="text"
            placeholder="Команда або учасник">

        </div>



        <div class="form-group">

            <label>Яке пиво купив</label>

            <input
            id="beer"
            type="text"
            placeholder="Наприклад: Hoegaarden">

        </div>



        <div class="buttons">

            <button id="cancelBtn">
                Скасувати
            </button>

            <button id="saveBtn">
                Зберегти
            </button>

        </div>

    </div>

</div>



<script src="script.js"></script>

</body>
</html>
